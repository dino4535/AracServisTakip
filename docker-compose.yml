version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: arac-servis-backend
    ports:
      - "3010:3010"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=http://77.83.37.229:3010/api
    container_name: arac-servis-frontend
    ports:
      - "4010:4010"
    environment:
      - VITE_API_URL=http://77.83.37.229:3010/api
    restart: unless-stopped
